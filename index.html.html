<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Зурна Таана 🎨</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --card2: #16213e;
  --primary: #e94560;
  --secondary: #0f3460;
  --accent: #f5a623;
  --green: #00d084;
  --text: #eaeaea;
  --muted: #888;
  --radius: 18px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* SCREENS */
.screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; gap: 16px; }
.screen.active { display: flex; }

/* HOME */
#home {
  background: radial-gradient(ellipse at 60% 40%, #1a0a2e 0%, #0f0f1a 70%);
  text-align: center;
}
.logo {
  font-size: clamp(3.5rem, 14vw, 6rem);
  font-weight: 900;
  line-height: 1;
  background: linear-gradient(135deg, #e94560, #f5a623);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 30px rgba(233,69,96,0.4));
  animation: glow 2s ease-in-out infinite alternate;
}
@keyframes glow {
  from { filter: drop-shadow(0 0 20px rgba(233,69,96,0.3)); }
  to   { filter: drop-shadow(0 0 40px rgba(245,166,35,0.6)); }
}
.tagline { color: var(--muted); font-size: 1.1rem; font-weight: 700; }

.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 28px;
  width: 100%;
  max-width: 460px;
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
}

.btn {
  padding: 14px 32px;
  border: none;
  border-radius: 50px;
  font-family: 'Nunito', sans-serif;
  font-size: 1.1rem;
  font-weight: 900;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  outline: none;
}
.btn:active { transform: scale(0.96); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-primary { background: linear-gradient(135deg, #e94560, #c0392b); color: white; box-shadow: 0 4px 20px rgba(233,69,96,0.4); }
.btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(233,69,96,0.5); }

.btn-secondary { background: linear-gradient(135deg, #0f3460, #1a237e); color: white; box-shadow: 0 4px 20px rgba(15,52,96,0.4); }
.btn-secondary:hover:not(:disabled) { transform: translateY(-2px); }

.btn-green { background: linear-gradient(135deg, #00d084, #00b894); color: white; box-shadow: 0 4px 20px rgba(0,208,132,0.3); }
.btn-green:hover:not(:disabled) { transform: translateY(-2px); }

.btn-accent { background: linear-gradient(135deg, #f5a623, #e67e22); color: white; box-shadow: 0 4px 20px rgba(245,166,35,0.3); }

.btn-ghost { background: transparent; color: var(--muted); font-size: 0.9rem; box-shadow: none; padding: 8px 16px; }

input[type="text"] {
  width: 100%;
  padding: 14px 18px;
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  font-family: 'Nunito', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text);
  background: rgba(255,255,255,0.05);
  outline: none;
  transition: border-color 0.2s;
}
input[type="text"]:focus { border-color: var(--primary); }
input[type="text"]::placeholder { color: #444; }

label { font-size: 0.85rem; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 6px; }

.section-title { font-size: 1.5rem; font-weight: 900; text-align: center; }

/* LOBBY */
#lobby { text-align: center; }

.room-code-display {
  background: linear-gradient(135deg, var(--card2), var(--card));
  border-radius: 16px;
  padding: 20px 32px;
  border: 2px solid rgba(233,69,96,0.3);
}
.room-code-label { font-size: 0.8rem; color: var(--muted); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
.room-code-val { font-size: 3rem; font-weight: 900; color: var(--primary); letter-spacing: 8px; margin-top: 4px; }

.players-list { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 10px; }
.player-slot {
  display: flex; align-items: center; gap: 12px;
  background: var(--card);
  border-radius: 12px;
  padding: 12px 18px;
  border: 1px solid rgba(255,255,255,0.06);
}
.player-slot.filled { border-color: rgba(0,208,132,0.3); }
.player-dot { width: 12px; height: 12px; border-radius: 50%; background: #333; flex-shrink: 0; }
.player-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
.player-slot-name { font-weight: 700; font-size: 1rem; }
.player-slot-status { font-size: 0.8rem; color: var(--muted); margin-left: auto; }

.waiting-anim { display: flex; gap: 6px; justify-content: center; align-items: center; }
.waiting-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); animation: wait-bounce 1.2s ease-in-out infinite; }
.waiting-dot:nth-child(2) { animation-delay: 0.2s; }
.waiting-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes wait-bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }

/* WORD PICKER */
#word-picker { text-align: center; }
.word-options { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 420px; }
.word-option-btn {
  padding: 18px 24px;
  background: var(--card);
  border: 2px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 1.3rem;
  font-weight: 900;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  color: var(--text);
  display: flex; align-items: center; gap: 14px;
}
.word-option-btn:hover { border-color: var(--primary); background: rgba(233,69,96,0.1); transform: translateX(4px); }
.word-cat { font-size: 0.72rem; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; display: block; margin-top: 2px; }

/* GAME */
#game-screen {
  padding: 10px;
  justify-content: flex-start;
  padding-top: 10px;
  min-height: 100vh;
}

.game-header {
  width: 100%;
  max-width: 700px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.round-badge {
  background: var(--primary);
  color: white;
  border-radius: 50px;
  padding: 5px 14px;
  font-size: 0.85rem;
  font-weight: 900;
}

.score-badges { display: flex; gap: 8px; margin-left: auto; }
.score-badge {
  background: var(--card);
  border-radius: 50px;
  padding: 5px 12px;
  font-size: 0.85rem;
  font-weight: 700;
  border: 1px solid rgba(255,255,255,0.08);
}
.score-badge.me { border-color: var(--green); color: var(--green); }

.timer-wrap { width: 100%; max-width: 700px; }
.timer-bar-bg { height: 8px; background: rgba(255,255,255,0.08); border-radius: 8px; overflow: hidden; }
.timer-bar-fill { height: 100%; border-radius: 8px; transition: width 1s linear, background 1s; }

.word-display-strip {
  width: 100%;
  max-width: 700px;
  text-align: center;
  background: var(--card);
  border-radius: 12px;
  padding: 10px 16px;
  border: 1px solid rgba(255,255,255,0.06);
}
.word-strip-label { font-size: 0.75rem; color: var(--muted); font-weight: 700; letter-spacing: 1px; }
.word-strip-val { font-size: 1.4rem; font-weight: 900; letter-spacing: 6px; font-family: monospace; color: var(--accent); margin-top: 2px; }

.canvas-container {
  width: 100%;
  max-width: 700px;
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  border: 2px solid rgba(255,255,255,0.08);
  background: white;
}
canvas { display: block; width: 100%; touch-action: none; cursor: crosshair; }
canvas.viewer { cursor: default; }

.draw-tools {
  width: 100%;
  max-width: 700px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  background: var(--card);
  border-radius: 14px;
  padding: 10px 14px;
  border: 1px solid rgba(255,255,255,0.06);
}

.colors { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
.color-dot {
  width: 28px; height: 28px; border-radius: 50%;
  cursor: pointer; border: 3px solid transparent;
  transition: transform 0.15s, border-color 0.15s; flex-shrink: 0;
}
.color-dot:hover { transform: scale(1.2); }
.color-dot.active { border-color: white; transform: scale(1.2); }

.sep { width: 1px; height: 32px; background: rgba(255,255,255,0.1); flex-shrink: 0; }

.size-btns { display: flex; gap: 4px; align-items: center; }
.size-btn {
  width: 34px; height: 34px; border-radius: 10px;
  border: 2px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.size-btn.active { border-color: var(--primary); background: rgba(233,69,96,0.15); }
.size-dot { background: white; border-radius: 50%; }

.tool-btn {
  width: 34px; height: 34px; border-radius: 10px;
  border: 2px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  cursor: pointer; font-size: 1rem; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.tool-btn.active { border-color: var(--secondary); background: rgba(15,52,96,0.3); }

/* CHAT / GUESS */
.chat-wrap {
  width: 100%;
  max-width: 700px;
  display: flex;
  gap: 8px;
}
.chat-messages {
  flex: 1;
  max-height: 120px;
  overflow-y: auto;
  background: var(--card);
  border-radius: 12px;
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  border: 1px solid rgba(255,255,255,0.06);
  scroll-behavior: smooth;
}
.chat-msg { font-size: 0.88rem; line-height: 1.4; }
.chat-msg .who { font-weight: 900; color: var(--accent); }
.chat-msg.correct { background: rgba(0,208,132,0.15); border-radius: 8px; padding: 4px 8px; }
.chat-msg.correct .who { color: var(--green); }
.chat-msg.system { color: var(--muted); font-style: italic; }

.guess-row {
  width: 100%;
  max-width: 700px;
  display: flex;
  gap: 8px;
}
.guess-row input { flex: 1; }

/* STATUS BAR */
.status-bar {
  background: var(--card2);
  border-radius: 10px;
  padding: 8px 16px;
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--muted);
  width: 100%;
  max-width: 700px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.05);
}
.status-bar.drawing { color: var(--accent); border-color: rgba(245,166,35,0.3); }
.status-bar.guessing { color: var(--green); border-color: rgba(0,208,132,0.3); }

/* RESULT OVERLAY */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; padding: 20px;
  animation: fade-in 0.2s ease;
}
.overlay-box {
  background: var(--card);
  border-radius: var(--radius);
  padding: 36px 28px;
  text-align: center;
  max-width: 400px;
  width: 100%;
  border: 1px solid rgba(255,255,255,0.1);
  animation: pop 0.3s cubic-bezier(.36,1.5,.64,1) both;
}
.overlay-emoji { font-size: 5rem; }
.overlay-title { font-size: 1.8rem; font-weight: 900; margin-top: 10px; }
.overlay-sub { color: var(--muted); font-size: 1rem; margin-top: 6px; }
.overlay-word { font-size: 2rem; font-weight: 900; color: var(--accent); margin-top: 8px; }

/* WINNER */
#winner-screen { text-align: center; }
.trophy { font-size: 6rem; animation: spin-in 0.5s cubic-bezier(.36,1.5,.64,1) both; }
.winner-name { font-size: 2.8rem; font-weight: 900; color: var(--primary); }
.final-scores { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 8px; }
.final-row {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--card); border-radius: 12px; padding: 12px 18px;
  border: 1px solid rgba(255,255,255,0.06);
}
.final-row.winner { border-color: var(--primary); }
.pts { background: var(--accent); color: #1a1a1a; border-radius: 50px; padding: 4px 14px; font-weight: 900; }

/* CONFETTI */
.confetti-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
.cp { position: absolute; width: 10px; height: 14px; border-radius: 3px; animation: cf 1.6s ease-in forwards; }
@keyframes cf { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }

@keyframes pop { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }
@keyframes spin-in { 0%{transform:rotate(-180deg) scale(0);opacity:0} 100%{transform:rotate(0) scale(1);opacity:1} }
@keyframes fade-in { from{opacity:0} to{opacity:1} }
.fade-in { animation: fade-in 0.3s ease both; }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="logo">Зурна Таана</div>
  <div class="tagline">✏️ Зурна — 🔍 Таана — 🌐 Real-time</div>
  <div class="card fade-in" style="display:flex;flex-direction:column;gap:14px">
    <div>
      <label>Таны нэр</label>
      <input type="text" id="home-name" placeholder="Нэрээ оруулна уу" maxlength="15">
    </div>
    <button class="btn btn-primary" onclick="createRoom()">🎮 Өрөө үүсгэх</button>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="flex:1;height:1px;background:rgba(255,255,255,0.08)"></div>
      <span style="color:var(--muted);font-size:0.85rem;font-weight:700">эсвэл</span>
      <div style="flex:1;height:1px;background:rgba(255,255,255,0.08)"></div>
    </div>
    <div>
      <label>Өрөөний код</label>
      <input type="text" id="join-code" placeholder="XXXX" maxlength="6" style="text-transform:uppercase;letter-spacing:4px;font-size:1.3rem;text-align:center">
    </div>
    <button class="btn btn-secondary" onclick="joinRoom()">🚪 Нэгдэх</button>
  </div>
  <div id="home-error" style="color:var(--primary);font-size:0.9rem;font-weight:700;min-height:20px"></div>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
  <div class="section-title">🎯 Тоглогчид хүлээж байна</div>
  <div class="room-code-display">
    <div class="room-code-label">Өрөөний код</div>
    <div class="room-code-val" id="lobby-code">????</div>
  </div>
  <div style="color:var(--muted);font-size:0.9rem;font-weight:700">Найздаа энэ кодыг илгээгээрэй 📲</div>
  <div class="players-list" id="players-list"></div>
  <div class="waiting-anim" id="waiting-indicator">
    <div class="waiting-dot"></div><div class="waiting-dot"></div><div class="waiting-dot"></div>
  </div>
  <button class="btn btn-green" id="start-btn" onclick="startGame()" style="display:none">▶ Тоглоом эхлэх</button>
  <div style="color:var(--muted);font-size:0.85rem;font-weight:700" id="lobby-status">2-р тоглогчийг хүлээж байна...</div>
  <button class="btn btn-ghost" onclick="leaveGame()">← Гарах</button>
</div>

<!-- WORD PICKER -->
<div id="word-picker" class="screen">
  <div class="section-title" id="picker-title">✏️ Үгээ сонгоно уу</div>
  <div style="color:var(--muted);font-size:0.95rem;font-weight:700">Аль үгийг зурах вэ?</div>
  <div class="word-options" id="word-options"></div>
</div>

<!-- WAITING FOR DRAWER -->
<div id="waiting-draw" class="screen">
  <div style="font-size:4rem">⏳</div>
  <div class="section-title" id="waiting-draw-text">Зурагч үгээ сонгож байна...</div>
  <div class="waiting-anim"><div class="waiting-dot"></div><div class="waiting-dot"></div><div class="waiting-dot"></div></div>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <div class="game-header">
    <div class="round-badge" id="g-round">1/5</div>
    <div id="g-drawer-label" style="font-size:0.9rem;font-weight:700;color:var(--muted)"></div>
    <div class="score-badges" id="g-scores"></div>
    <div id="g-timer-val" style="font-size:1.3rem;font-weight:900;color:var(--primary);margin-left:4px">60</div>
  </div>

  <div class="timer-wrap">
    <div class="timer-bar-bg"><div class="timer-bar-fill" id="g-timer-bar"></div></div>
  </div>

  <div class="word-display-strip">
    <div class="word-strip-label" id="word-strip-label">ЗУРАХ ҮГ</div>
    <div class="word-strip-val" id="word-strip-val">_ _ _</div>
  </div>

  <div class="canvas-container">
    <canvas id="drawCanvas"></canvas>
  </div>

  <div class="draw-tools" id="draw-tools">
    <div class="colors" id="color-palette"></div>
    <div class="sep"></div>
    <div class="size-btns" id="size-btns"></div>
    <div class="sep"></div>
    <button class="tool-btn" id="eraser-btn" onclick="toggleEraser()" title="Баллуур">🩹</button>
    <button class="tool-btn" onclick="clearCanvasAndSync()" title="Цэвэрлэх">🗑️</button>
  </div>

  <div class="status-bar" id="status-bar">...</div>

  <div class="chat-messages" id="chat-messages"></div>

  <div class="guess-row" id="guess-row" style="display:none">
    <input type="text" id="guess-input" placeholder="Таамаглалаа бич..." maxlength="40" onkeydown="if(event.key==='Enter')submitGuess()">
    <button class="btn btn-accent" onclick="submitGuess()">Таах</button>
  </div>
</div>

<!-- WINNER -->
<div id="winner-screen" class="screen">
  <div class="trophy">🏆</div>
  <div style="font-size:1rem;color:var(--muted);font-weight:700;letter-spacing:2px;text-transform:uppercase">ЯЛАГЧ</div>
  <div class="winner-name" id="w-name"></div>
  <div class="final-scores" id="w-scores"></div>
  <button class="btn btn-primary" onclick="playAgain()">🔄 Дахин тоглох</button>
  <button class="btn btn-ghost" onclick="leaveGame()">Нүүр хуудас</button>
</div>

<div class="confetti-wrap" id="confetti-wrap"></div>

  {w:"Гэр",c:"Байшин"},{w:"Гүүр",c:"Байгуулмал"},{w:"Цамхаг",c:"Байгуулмал"},

  {w:"Нүд",c:"Бие"},{w:"Хамар",c:"Бие"},{w:"Гар",c:"Бие"},{w:"Хөл",c:"Бие"},
];

// ── STATE ──
let myId = Math.random().toString(36).slice(2,9);
let myName = '';
let roomCode = '';
let roomRef = null;
let isHost = false;
let isDrawer = false;
let currentWord = '';
let totalRounds = 5;
let timerInterval = null;
let timeLeft = 60;
let lastStrokeCount = 0;
let listeners = [];
let roundActive = false;

// Canvas
let canvas, ctx, drawing = false, isEraser = false, brushSize = 8, brushColor = '#2d3436';
const COLORS = ['#2d3436','#e17055','#0984e3','#00b894','#fdcb6e','#a29bfe','#fd79a8','#ffffff'];

// ── HELPERS ──
function uid() { return Math.random().toString(36).slice(2,9); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function err(msg) { document.getElementById('home-error').textContent = msg; }

function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for(let i=0;i<4;i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}

// ── ROOM ──
window.createRoom = async function() {
  myName = document.getElementById('home-name').value.trim() || 'Тоглогч';
  roomCode = genCode();
  isHost = true;
  roomRef = ref(db, 'rooms/' + roomCode);
  await set(roomRef, {
    host: myId,
    state: 'lobby',
    round: 0,
    totalRounds: 5,
    players: { [myId]: { name: myName, score: 0, online: true } },
    strokes: [],
    chat: [],
  });
  listenRoom();
  document.getElementById('lobby-code').textContent = roomCode;
  showScreen('lobby');
}

window.joinRoom = async function() {
  myName = document.getElementById('home-name').value.trim() || 'Тоглогч';
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if(!code || code.length < 4) { err('Өрөөний кодоо оруулна уу'); return; }
  roomCode = code;
  const snap = await get(ref(db, 'rooms/' + code));
  if(!snap.exists()) { err('Өрөө олдсонгүй. Кодоо шалгана уу.'); return; }
  const data = snap.val();
  const players = data.players || {};
  if(Object.keys(players).length >= 2) { err('Өрөө дүүрсэн байна'); return; }
  roomRef = ref(db, 'rooms/' + code);
  await update(ref(db, 'rooms/' + code + '/players/' + myId), { name: myName, score: 0, online: true });
  listenRoom();
  document.getElementById('lobby-code').textContent = code;
  showScreen('lobby');
}

window.leaveGame = function() {
  cleanupListeners();
  if(roomRef) { update(ref(db, 'rooms/' + roomCode + '/players/' + myId), { online: false }); }
  showScreen('home');
  location.reload();
}

// ── LISTEN ──
function listenRoom() {
  const unsub = onValue(roomRef, snap => {
    if(!snap.exists()) return;
    const data = snap.val();
    handleRoomUpdate(data);
  });
  listeners.push(() => off(roomRef));
}

function handleRoomUpdate(data) {
  updateLobbyUI(data);

  if(data.state === 'picking') {
    clearInterval(timerInterval);
    const players = data.players || {};
    const drawerIdInData = data.drawerId;
    isDrawer = drawerIdInData === myId;
    currentWord = '';

    if(isDrawer) {
      showWordPickerUI(data);
    } else {
      const drawerName = players[drawerIdInData]?.name || 'Зурагч';
      document.getElementById('waiting-draw-text').textContent = drawerName + ' үгээ сонгож байна...';
      showScreen('waiting-draw');
    }
  }

  if(data.state === 'drawing') {
    if(data.word && isDrawer) currentWord = data.word;
    showGameScreen(data);
    syncStrokes(data);
  }

  if(data.state === 'roundend') {
    clearInterval(timerInterval);
    roundActive = false;
    showRoundEnd(data);
  }

  if(data.state === 'gameover') {
    clearInterval(timerInterval);
    showWinner(data);
  }

  if(data.chat) {
    renderChat(data.chat);
  }
}

// ── LOBBY UI ──
function updateLobbyUI(data) {
  if(document.getElementById('lobby').classList.contains('active')) {
    const players = data.players || {};
    const list = document.getElementById('players-list');
    list.innerHTML = '';
    Object.entries(players).forEach(([id, p]) => {
      const div = document.createElement('div');
      div.className = 'player-slot' + (p.online ? ' filled' : '');
      div.innerHTML = `<div class="player-dot ${p.online?'online':''}"></div><div class="player-slot-name">${p.name}${id===myId?' (Та)':''}</div><div class="player-slot-status">${p.online?'✅ Онлайн':'⭕ Офлайн'}</div>`;
      list.appendChild(div);
    });
    const count = Object.values(players).filter(p => p.online).length;
    const startBtn = document.getElementById('start-btn');
    const lobbyStatus = document.getElementById('lobby-status');
    if(count >= 2 && isHost) {
      startBtn.style.display = 'block';
      document.getElementById('waiting-indicator').style.display = 'none';
      lobbyStatus.textContent = 'Тоглоом эхлэхэд бэлэн!';
    } else if(count >= 2) {
      lobbyStatus.textContent = 'Хост тоглоомыг эхлүүлнэ...';
      document.getElementById('waiting-indicator').style.display = 'none';
    } else {
      lobbyStatus.textContent = '2-р тоглогчийг хүлээж байна...';
    }
  }
}

// ── START ──
window.startGame = async function() {
  const snap = await get(ref(db, 'rooms/' + roomCode + '/players'));
  const players = snap.val() || {};
  const ids = Object.keys(players).filter(id => players[id].online);
  if(ids.length < 2) return;
  const drawerIdx = 0;
  await update(roomRef, {
    state: 'picking',
    round: 1,
    drawerId: ids[drawerIdx],
    guesserId: ids[1 - drawerIdx],
    drawerIndex: drawerIdx,
    correctGuess: false,
  });
}

// ── WORD PICKER ──
function showWordPickerUI(data) {
  const words = pickThreeWords();
  document.getElementById('picker-title').textContent = '✏️ ' + myName + ', үгээ сонгоно уу!';
  const list = document.getElementById('word-options');
  list.innerHTML = '';
  words.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'word-option-btn';
    btn.innerHTML = `<span>${['🟥','🟦','🟨'][i]}</span><span>${o.w}<span class="word-cat">${o.c}</span></span>`;
    btn.onclick = () => selectWord(o.w, data);
    list.appendChild(btn);
  });
  showScreen('word-picker');
}

async function selectWord(word, data) {
  currentWord = word;
  const hint = makeHint(word);
  await update(roomRef, {
    state: 'drawing',
    word: word,
    hint: hint,
    strokes: null,
    correctGuess: false,
    startTime: Date.now(),
  });
  clearCanvasFull();
}

function makeHint(word) {
  return word.split('').map((c, i) => i === 0 ? c : '_').join(' ');
}

function pickThreeWords() {
  return [...WORDS].sort(() => Math.random() - 0.5).slice(0, 3);
}

// ── GAME SCREEN ──
let gameShown = false;
function showGameScreen(data) {
  if(!document.getElementById('game-screen').classList.contains('active')) {
    gameShown = false;
  }

  setupCanvas();
  showScreen('game-screen');

  const players = data.players || {};
  const drawerName = players[data.drawerId]?.name || '?';
  document.getElementById('g-round').textContent = `${data.round}/${data.totalRounds || 5}`;
  document.getElementById('g-drawer-label').textContent = isDrawer ? '✏️ Та зурж байна' : `👀 ${drawerName} зурж байна`;

  // scores
  const sb = document.getElementById('g-scores');
  sb.innerHTML = '';
  Object.entries(players).forEach(([id, p]) => {
    if(!p.online) return;
    const d = document.createElement('div');
    d.className = 'score-badge' + (id === myId ? ' me' : '');
    d.textContent = `${p.name}: ${p.score || 0}`;
    sb.appendChild(d);
  });

  // word display
  if(isDrawer) {
    document.getElementById('word-strip-label').textContent = 'ЗУРАХ ҮГ';
    document.getElementById('word-strip-val').textContent = currentWord;
  } else {
    document.getElementById('word-strip-label').textContent = 'ТААХ ҮГ';
    document.getElementById('word-strip-val').textContent = data.hint || '_ _ _';
  }

  // tools
  document.getElementById('draw-tools').style.display = isDrawer ? 'flex' : 'none';
  document.getElementById('guess-row').style.display = isDrawer ? 'none' : 'flex';
  canvas.classList.toggle('viewer', !isDrawer);

  // status
  const sb2 = document.getElementById('status-bar');
  sb2.className = 'status-bar ' + (isDrawer ? 'drawing' : 'guessing');
  sb2.textContent = isDrawer ? '🖌️ Зур! Таагч таах болно' : '🔍 Зургийг харж таа!';

  // timer
  if(!roundActive) {
    roundActive = true;
    startTimer(data);
  }
}

// ── TIMER ──
function startTimer(data) {
  clearInterval(timerInterval);
  const duration = 80;
  const elapsed = data.startTime ? Math.floor((Date.now() - data.startTime) / 1000) : 0;
  timeLeft = Math.max(0, duration - elapsed);
  updateTimerUI(timeLeft, duration);

  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerUI(timeLeft, duration);
    if(timeLeft <= 0) {
      clearInterval(timerInterval);
      if(isHost) endRound(false, '');
    }
  }, 1000);
}

function updateTimerUI(t, max) {
  const pct = Math.max(0, (t / max) * 100);
  const bar = document.getElementById('g-timer-bar');
  bar.style.width = pct + '%';
  bar.style.background = pct > 50
    ? 'linear-gradient(90deg,#00d084,#0984e3)'
    : pct > 25
    ? 'linear-gradient(90deg,#fdcb6e,#e17055)'
    : 'linear-gradient(90deg,#e94560,#c0392b)';
  document.getElementById('g-timer-val').textContent = t;
}

// ── CANVAS ──
function setupCanvas() {
  if(canvas) return;
  canvas = document.getElementById('drawCanvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
  setupColors();
  setupSizes();
  setupDrawEvents();
}

function resizeCanvas() {
  const w = canvas.parentElement.clientWidth;
  canvas.width = w;
  canvas.height = Math.round(Math.min(w * 0.6, 400));
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

function setupColors() {
  const pal = document.getElementById('color-palette');
  pal.innerHTML = '';
  COLORS.forEach((c, i) => {
    const d = document.createElement('div');
    d.className = 'color-dot' + (i === 0 ? ' active' : '');
    d.style.background = c;
    if(c === '#ffffff') d.style.outline = '2px solid #555';
    d.onclick = () => {
      isEraser = false;
      document.getElementById('eraser-btn').classList.remove('active');
      document.querySelectorAll('.color-dot').forEach(x => x.classList.remove('active'));
      d.classList.add('active');
      brushColor = c;
    };
    pal.appendChild(d);
  });
}

function setupSizes() {
  const sizes = [{s:4,d:8},{s:10,d:14},{s:20,d:20}];
  const wrap = document.getElementById('size-btns');
  wrap.innerHTML = '';
  sizes.forEach((sz, i) => {
    const b = document.createElement('button');
    b.className = 'size-btn' + (i === 0 ? ' active' : '');
    const dot = document.createElement('div');
    dot.className = 'size-dot';
    dot.style.cssText = `width:${sz.d}px;height:${sz.d}px`;
    b.appendChild(dot);
    b.onclick = () => {
      brushSize = sz.s;
      document.querySelectorAll('.size-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    };
    wrap.appendChild(b);
  });
}

function setupDrawEvents() {
  let lastX, lastY;
  const getPos = e => {
    const r = canvas.getBoundingClientRect();
    const sx = canvas.width / r.width;
    const sy = canvas.height / r.height;
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left) * sx, y: (src.clientY - r.top) * sy };
  };

  const start = e => {
    if(!isDrawer) return;
    e.preventDefault();
    drawing = true;
    const {x,y} = getPos(e);
    lastX = x; lastY = y;
    ctx.beginPath();
    ctx.moveTo(x,y);
  };
  const move = e => {
    if(!isDrawer || !drawing) return;
    e.preventDefault();
    const {x,y} = getPos(e);
    if(isEraser) {
      ctx.save();
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath();
      ctx.arc(x, y, brushSize * 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      pushStroke({type:'erase',x,y,s:brushSize*2});
    } else {
      ctx.strokeStyle = brushColor;
      ctx.lineWidth = brushSize;
      ctx.lineTo(x,y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x,y);
      pushStroke({type:'line',x1:lastX,y1:lastY,x2:x,y2:y,c:brushColor,s:brushSize});
    }
    lastX = x; lastY = y;
  };
  const end = () => { drawing = false; ctx.beginPath(); };

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', end);
  canvas.addEventListener('mouseleave', end);
  canvas.addEventListener('touchstart', start, {passive:false});
  canvas.addEventListener('touchmove', move, {passive:false});
  canvas.addEventListener('touchend', end);
}

// ── STROKES SYNC ──
let strokeBuffer = [];
let strokeFlushTimer = null;

function pushStroke(stroke) {
  strokeBuffer.push(stroke);
  if(!strokeFlushTimer) {
    strokeFlushTimer = setTimeout(flushStrokes, 80);
  }
}

async function flushStrokes() {
  strokeFlushTimer = null;
  if(!strokeBuffer.length) return;
  const newStrokes = [...strokeBuffer];
  strokeBuffer = [];
  const snap = await get(ref(db, 'rooms/' + roomCode + '/strokes'));
  const existing = snap.val() || [];
  await set(ref(db, 'rooms/' + roomCode + '/strokes'), [...existing, ...newStrokes]);
}

function syncStrokes(data) {
  if(isDrawer) return;
  const strokes = data.strokes || [];
  if(strokes.length <= lastStrokeCount) return;
  const newStrokes = strokes.slice(lastStrokeCount);
  lastStrokeCount = strokes.length;
  newStrokes.forEach(s => replayStroke(s));
}

function replayStroke(s) {
  if(!ctx) return;
  if(s.type === 'clear') {
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  } else if(s.type === 'erase') {
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.s, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  } else if(s.type === 'line') {
    ctx.strokeStyle = s.c;
    ctx.lineWidth = s.s;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(s.x1, s.y1);
    ctx.lineTo(s.x2, s.y2);
    ctx.stroke();
  }
}

window.toggleEraser = function() {
  isEraser = !isEraser;
  document.getElementById('eraser-btn').classList.toggle('active', isEraser);
}

window.clearCanvasAndSync = async function() {
  clearCanvasFull();
  const snap = await get(ref(db, 'rooms/' + roomCode + '/strokes'));
  const existing = snap.val() || [];
  await set(ref(db, 'rooms/' + roomCode + '/strokes'), [...existing, {type:'clear'}]);
}

function clearCanvasFull() {
  if(!ctx) return;
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  lastStrokeCount = 0;
}

// ── GUESS ──
window.submitGuess = async function() {
  const input = document.getElementById('guess-input');
  const guess = input.value.trim();
  if(!guess) return;
  input.value = '';

  const snap = await get(ref(db, 'rooms/' + roomCode));
  const data = snap.val();
  if(!data || data.correctGuess) return;

  const correct = normalize(guess) === normalize(data.word || '');

  await push(ref(db, 'rooms/' + roomCode + '/chat'), {
    who: myName,
    msg: guess,
    correct: correct,
    ts: Date.now(),
  });

  if(correct) {
    // give point to guesser
    const curScore = data.players?.[myId]?.score || 0;
    await update(ref(db, 'rooms/' + roomCode + '/players/' + myId), { score: curScore + 1 });
    await update(roomRef, { correctGuess: true });
    clearInterval(timerInterval);
    if(isHost) setTimeout(() => endRound(true, myName), 1500);
  }
}

function normalize(s) { return s.toLowerCase().trim().replace(/\s+/g,''); }

// ── CHAT ──
let lastChatLen = 0;
function renderChat(chatObj) {
  const msgs = Object.values(chatObj || {}).sort((a,b) => a.ts - b.ts);
  if(msgs.length <= lastChatLen) return;
  lastChatLen = msgs.length;
  const box = document.getElementById('chat-messages');
  box.innerHTML = '';
  msgs.forEach(m => {
    const div = document.createElement('div');
    div.className = 'chat-msg' + (m.correct ? ' correct' : '');
    div.innerHTML = `<span class="who">${m.who}:</span> ${m.correct ? '🎉 ' : ''}${m.msg}`;
    box.appendChild(div);
  });
  box.scrollTop = box.scrollHeight;
}

// ── ROUND END ──
async function endRound(correct, guesserName) {
  if(!isHost) return;
  const snap = await get(ref(db, 'rooms/' + roomCode));
  const data = snap.val();
  if(!data) return;

  await update(roomRef, {
    state: 'roundend',
    lastCorrect: correct,
    lastGuesser: guesserName,
    lastWord: data.word,
  });
}

function showRoundEnd(data) {
  clearInterval(timerInterval);
  const correct = data.lastCorrect;
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="overlay-box">
      <div class="overlay-emoji">${correct ? '🎉' : '😅'}</div>
      <div class="overlay-title">${correct ? data.lastGuesser + ' зөв тааллаа!' : 'Хугацаа дуусав!'}</div>
      <div class="overlay-sub">Зурсан үг:</div>
      <div class="overlay-word">${data.lastWord || ''}</div>
    </div>`;
  document.body.appendChild(overlay);
  if(correct) spawnConfetti();
  setTimeout(() => {
    overlay.remove();
    if(isHost) nextRound(data);
  }, 2500);
}

async function nextRound(data) {
  const snap = await get(ref(db, 'rooms/' + roomCode + '/players'));
  const players = snap.val() || {};
  const ids = Object.keys(players).filter(id => players[id].online);

  const nextRound = (data.round || 1) + 1;
  const total = data.totalRounds || 5;

  if(nextRound > total) {
    await update(roomRef, { state: 'gameover' });
    return;
  }

  // swap drawer
  const curDrawerIdx = ids.indexOf(data.drawerId);
  const nextDrawerIdx = (curDrawerIdx + 1) % ids.length;
  const nextDrawerId = ids[nextDrawerIdx];
  const nextGuesserId = ids[1 - nextDrawerIdx];

  roundActive = false;
  lastChatLen = 0;
  lastStrokeCount = 0;

  await update(roomRef, {
    state: 'picking',
    round: nextRound,
    drawerId: nextDrawerId,
    guesserId: nextGuesserId,
    strokes: null,
    chat: null,
    correctGuess: false,
    word: null,
    hint: null,
  });
}

// ── WINNER ──
function showWinner(data) {
  const players = data.players || {};
  let maxScore = -1, winnerName = '';
  Object.values(players).forEach(p => {
    if((p.score || 0) > maxScore) { maxScore = p.score; winnerName = p.name; }
  });
  document.getElementById('w-name').textContent = winnerName;
  const fs = document.getElementById('w-scores');
  fs.innerHTML = '';
  Object.entries(players).sort((a,b)=>(b[1].score||0)-(a[1].score||0)).forEach(([id,p]) => {
    const div = document.createElement('div');
    div.className = 'final-row' + ((p.score||0)===maxScore?' winner':'');
    div.innerHTML = `<span style="font-weight:900">${p.name}${id===myId?' (Та)':''}</span><span class="pts">${p.score||0} оноо</span>`;
    fs.appendChild(div);
  });
  showScreen('winner-screen');
  spawnConfetti();
}

window.playAgain = async function() {
  if(!isHost) return;
  const snap = await get(ref(db, 'rooms/' + roomCode + '/players'));
  const players = snap.val() || {};
  const resetPlayers = {};
  Object.keys(players).forEach(id => { resetPlayers[id] = {...players[id], score: 0}; });
  const ids = Object.keys(resetPlayers).filter(id => resetPlayers[id].online);
  roundActive = false; lastChatLen = 0; lastStrokeCount = 0; canvas = null; ctx = null; gameShown = false;
  await update(roomRef, {
    state: 'picking', round: 1, players: resetPlayers,
    drawerId: ids[0], guesserId: ids[1],
    strokes: null, chat: null, correctGuess: false, word: null,
  });
}

// ── CONFETTI ──
function spawnConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  const colors = ['#e94560','#00d084','#f5a623','#a29bfe','#0984e3','#fdcb6e'];
  for(let i=0;i<60;i++) {
    const p = document.createElement('div');
    p.className = 'cp';
    p.style.cssText = `left:${Math.random()*100}%;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};transform:rotate(${Math.random()*360}deg);animation-delay:${Math.random()*0.6}s;animation-duration:${1.2+Math.random()*0.8}s`;
    wrap.appendChild(p);
  }
  setTimeout(() => wrap.innerHTML = '', 3000);
}

function cleanupListeners() {
  clearInterval(timerInterval);
  listeners.forEach(fn => fn());
}
</script>
